site_name: REproduce Manual
site_description: REproduce user manual (EN/KR)
repo_url: https://github.com/aicers/reproduce
site_url: ""

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.tracking
    - search.highlight
    - search.suggest

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          name: English
          build: true
          default: true
          nav:
            - Overview: index.md
            - Prerequisites: prerequisites.md
            - Configuration: configuration.md
            - Operations: operations.md
            - Troubleshooting: troubleshooting.md
        - locale: ko
          name: 한국어
          build: true
          nav:
            - Overview: index.md
            - Prerequisites: prerequisites.md
            - Configuration: configuration.md
            - Operations: operations.md
            - Troubleshooting: troubleshooting.md
          nav_translations:
            Overview: 개요
            Prerequisites: 설치 전 준비
            Configuration: 설정
            Operations: 실행
            Troubleshooting: 문제 해결

extra_css:
  - .theme/styles/lists.css
  - .theme/styles/pdf.css
